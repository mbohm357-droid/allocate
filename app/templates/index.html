<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Allocate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --primary: #059669;
      --primary-light: #10B981;
      --accent: #0EA5E9;
      --bg: #F8FAFC;
      --card: #FFFFFF;
      --text: #0F172A;
      --muted: #64748B;
      --border: #E2E8F0;
      --goal-tint: #F0FDF4;
      --danger: #EF4444;
      --warning: #F59E0B;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.02em;
    }

    .logo span { color: var(--text); }

    /* ── Layout ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1.25rem;
    }

    /* ── Section 1: Weekly Check-In ── */
    .checkin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      align-items: end;
    }

    .field label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .field input {
      width: 100%;
      padding: 0.625rem 0.875rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9375rem;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.15s;
      outline: none;
    }

    .field input:focus { border-color: var(--primary); }

    .preview {
      font-size: 0.8125rem;
      color: var(--muted);
      margin-top: 0.4rem;
      min-height: 1.2em;
    }

    .preview strong { color: var(--primary); }

    .btn-run {
      width: 100%;
      padding: 0.75rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      margin-top: 1.25rem;
    }

    .btn-run:hover { background: var(--primary-light); }
    .btn-run:disabled { opacity: 0.55; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Section 2: Dashboard ── */
    #dashboard { display: none; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
    }

    .stat-label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }

    .stat-value.positive { color: var(--primary); }
    .stat-value.negative { color: var(--danger); }

    /* ── Spending bar chart ── */
    .chart-section { margin-bottom: 1.5rem; }

    .chart-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 110px 1fr 60px;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.625rem;
    }

    .bar-label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bar-track {
      background: var(--bg);
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .bar-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 4px;
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .bar-amount {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text);
      text-align: right;
    }

    /* ── Goal cards ── */
    .goals-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .goal-card {
      background: var(--goal-tint);
      border: 1px solid #BBF7D0;
      border-radius: 10px;
      padding: 1.125rem;
    }

    .goal-name {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.2rem;
    }

    .goal-desc {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .goal-progress-track {
      background: #D1FAE5;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }

    .goal-progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 4px;
      transition: width 0.6s ease;
    }

    .goal-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .goal-meta strong { color: var(--primary); }

    .goal-weekly {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--primary);
      margin-top: 0.3rem;
    }

    /* ── AI Recommendation ── */
    .recommendation {
      border-left: 4px solid var(--primary);
      padding-left: 1.25rem;
      background: var(--goal-tint);
      border-radius: 0 10px 10px 0;
      padding: 1.25rem 1.25rem 1.25rem 1.5rem;
    }

    .recommendation-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--primary);
      margin-bottom: 0.75rem;
    }

    .recommendation-body {
      font-size: 0.9rem;
      line-height: 1.65;
      color: var(--text);
    }

    .recommendation-body h1,
    .recommendation-body h2,
    .recommendation-body h3 {
      font-size: 1rem;
      font-weight: 600;
      margin: 1rem 0 0.4rem;
    }

    .recommendation-body ul,
    .recommendation-body ol {
      padding-left: 1.25rem;
      margin: 0.5rem 0;
    }

    .recommendation-body li { margin-bottom: 0.25rem; }

    .recommendation-body p { margin-bottom: 0.6rem; }

    .recommendation-body strong { font-weight: 600; }

    /* ── Section 3: Accounts ── */
    .accounts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .account-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .account-icon {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.125rem;
      flex-shrink: 0;
    }

    .icon-bank { background: #EFF6FF; }
    .icon-crypto { background: #FFF7ED; }
    .icon-invest { background: #F5F3FF; }

    .account-label {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 500;
    }

    .account-value {
      font-size: 0.9375rem;
      font-weight: 700;
      color: var(--text);
    }

    .holdings-list {
      margin-top: 1rem;
    }

    .holdings-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.625rem;
    }

    .holding-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.875rem;
    }

    .holding-row:last-child { border-bottom: none; }

    .holding-ticker { font-weight: 600; }
    .holding-amount { color: var(--muted); }

    .loading-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      opacity: 0.4;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

    .error-msg {
      font-size: 0.8125rem;
      color: var(--danger);
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">allo<span>cate</span></div>
</header>

<main>

  <!-- ── Section 1: Weekly Check-In ── -->
  <div class="card">
    <div class="card-title">Weekly Check-In</div>
    <div class="checkin-grid">
      <div class="field">
        <label>Hours Worked</label>
        <input type="number" id="hours-input" placeholder="e.g. 38" min="0" max="80" step="0.5" />
        <div class="preview" id="takehome-preview">Enter hours to see take-home estimate</div>
      </div>
      <div class="field">
        <label>Lending / Yield Balance ($)</label>
        <input type="number" id="lending-input" placeholder="0.00" min="0" step="0.01" value="0" />
        <div class="preview">Coinbase Earn, HYSA, etc.</div>
      </div>
    </div>
    <button class="btn-run" id="run-btn" onclick="runAnalysis()">
      <span id="btn-text">Run Analysis</span>
      <div class="spinner" id="btn-spinner"></div>
    </button>
    <div class="error-msg" id="error-msg" style="display:none;"></div>
  </div>

  <!-- ── Section 2: Dashboard (hidden until analysis) ── -->
  <div id="dashboard">

    <div class="card">
      <div class="card-title">This Week</div>

      <div class="stats-row">
        <div class="stat">
          <div class="stat-label">Take-Home</div>
          <div class="stat-value positive" id="stat-takehome">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Total Spent</div>
          <div class="stat-value" id="stat-spent">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Budget Remaining</div>
          <div class="stat-value" id="stat-remaining">—</div>
        </div>
      </div>

      <div class="chart-section">
        <div class="chart-title">Spending by Category</div>
        <div id="spending-chart"></div>
      </div>

    </div>

    <!-- Goals -->
    <div class="card">
      <div class="card-title">Savings Goals</div>
      <div class="goals-grid" id="goals-grid"></div>
    </div>

    <!-- AI Recommendation -->
    <div class="card">
      <div class="recommendation">
        <div class="recommendation-label">AI Recommendation</div>
        <div class="recommendation-body" id="recommendation-body">
          Waiting for analysis…
        </div>
      </div>
    </div>

  </div>

  <!-- ── Section 3: Accounts ── -->
  <div class="card">
    <div class="card-title">Accounts</div>
    <div class="accounts-grid" id="accounts-grid">
      <div class="account-item">
        <div class="account-icon icon-bank">🏦</div>
        <div>
          <div class="account-label">Checking</div>
          <div class="account-value" id="acct-checking"><span class="loading-dot"></span></div>
        </div>
      </div>
      <div class="account-item">
        <div class="account-icon icon-crypto">₿</div>
        <div>
          <div class="account-label">Coinbase (USD Cash)</div>
          <div class="account-value" id="acct-crypto"><span class="loading-dot"></span></div>
        </div>
      </div>
    </div>
    <div class="holdings-list" id="holdings-section" style="display:none;">
      <div class="holdings-title">Crypto Holdings</div>
      <div id="holdings-list"></div>
    </div>
  </div>

</main>

<script>
  const HOURLY_RATE = {{ hourly_rate }};
  const TAX_RATE = {{ tax_rate }};

  // ── Live take-home preview ──
  document.getElementById('hours-input').addEventListener('input', function () {
    const hours = parseFloat(this.value) || 0;
    const gross = hours * HOURLY_RATE;
    const takeHome = gross * (1 - TAX_RATE);
    const preview = document.getElementById('takehome-preview');
    if (hours > 0) {
      preview.innerHTML = `Gross <strong>$${gross.toFixed(2)}</strong> → take-home <strong>$${takeHome.toFixed(2)}</strong>`;
    } else {
      preview.textContent = 'Enter hours to see take-home estimate';
    }
  });

  // ── Format currency ──
  function fmt(n) {
    return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  // ── Run analysis ──
  async function runAnalysis() {
    const hours = parseFloat(document.getElementById('hours-input').value);
    const lending = parseFloat(document.getElementById('lending-input').value) || 0;
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'none';

    if (!hours || hours <= 0) {
      errEl.textContent = 'Please enter hours worked.';
      errEl.style.display = 'block';
      return;
    }

    const btn = document.getElementById('run-btn');
    const btnText = document.getElementById('btn-text');
    const spinner = document.getElementById('btn-spinner');
    btn.disabled = true;
    btnText.style.display = 'none';
    spinner.style.display = 'block';

    try {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ hours, lending_balance: lending }),
      });

      if (!res.ok) throw new Error(`Server error ${res.status}`);
      const data = await res.json();
      renderDashboard(data);
    } catch (err) {
      errEl.textContent = 'Analysis failed: ' + err.message;
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btnText.style.display = 'inline';
      spinner.style.display = 'none';
    }
  }

  function renderDashboard(data) {
    // Stats
    document.getElementById('stat-takehome').textContent = fmt(data.take_home);
    document.getElementById('stat-spent').textContent = fmt(data.total_spent);

    const remaining = data.spending_budget - data.total_spent;
    const remEl = document.getElementById('stat-remaining');
    remEl.textContent = fmt(Math.abs(remaining));
    remEl.className = 'stat-value ' + (remaining >= 0 ? 'positive' : 'negative');

    // Spending chart
    const chart = document.getElementById('spending-chart');
    chart.innerHTML = '';
    const maxAmount = Math.max(...Object.values(data.spending_by_category), 1);
    for (const [cat, amt] of Object.entries(data.spending_by_category)) {
      const pct = Math.min(100, (amt / maxAmount) * 100);
      chart.innerHTML += `
        <div class="bar-row">
          <div class="bar-label">${cat}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:0%" data-pct="${pct}"></div>
          </div>
          <div class="bar-amount">${fmt(amt)}</div>
        </div>`;
    }
    // Animate bars after paint
    requestAnimationFrame(() => {
      chart.querySelectorAll('.bar-fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    });

    // Goals
    const grid = document.getElementById('goals-grid');
    grid.innerHTML = '';
    for (const g of data.goals) {
      const pct = g.target > 0 ? Math.min(100, (g.current / g.target) * 100) : 0;
      const desc = g.description ? `<div class="goal-desc">${g.description}</div>` : '<div class="goal-desc" style="margin-bottom:0.75rem"></div>';
      grid.innerHTML += `
        <div class="goal-card">
          <div class="goal-name">${g.name}</div>
          ${desc}
          <div class="goal-progress-track">
            <div class="goal-progress-fill" style="width:${pct}%"></div>
          </div>
          <div class="goal-meta">
            <span>${fmt(g.current)} of ${fmt(g.target)}</span>
            <span>${g.deadline}</span>
          </div>
          <div class="goal-weekly">Min ${fmt(g.min_weekly)}/week needed</div>
        </div>`;
    }

    // Recommendation
    const recBody = document.getElementById('recommendation-body');
    recBody.innerHTML = marked.parse(data.recommendation);

    // Update accounts with fresh data from analysis
    updateAccountDisplay(
      data.balances.checking,
      data.balances.crypto,
      data.coinbase_holdings
    );

    // Show dashboard
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('dashboard').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function updateAccountDisplay(checking, cryptoUsd, holdings) {
    const checkEl = document.getElementById('acct-checking');
    checkEl.textContent = checking != null ? fmt(checking) : 'Unavailable';

    const cryptoEl = document.getElementById('acct-crypto');
    cryptoEl.textContent = cryptoUsd != null ? fmt(cryptoUsd) : 'Unavailable';

    const section = document.getElementById('holdings-section');
    const list = document.getElementById('holdings-list');
    if (holdings && Object.keys(holdings).length > 0) {
      list.innerHTML = Object.entries(holdings)
        .sort((a, b) => b[1] - a[1])
        .map(([cur, amt]) => `
          <div class="holding-row">
            <span class="holding-ticker">${cur}</span>
            <span class="holding-amount">${amt.toLocaleString('en-US', { maximumFractionDigits: 8 })}</span>
          </div>`).join('');
      section.style.display = 'block';
    }
  }

  // ── Load account balances on page load ──
  (async function loadAccounts() {
    try {
      const res = await fetch('/api/accounts');
      if (!res.ok) return;
      const data = await res.json();
      updateAccountDisplay(data.checking, data.coinbase_usd, data.coinbase_holdings);
    } catch (_) {
      // silent — accounts section degrades gracefully
    }
  })();
</script>

</body>
</html>
